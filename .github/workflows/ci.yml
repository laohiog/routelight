name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-and-tauri:
    name: Rust checks and Tauri build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: routelight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: routelight/package-lock.json

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            routelight/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('routelight/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Tauri build
        run: npm run build
